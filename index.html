<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoreEight</title>

  <style>
    :root {
      --bg: #050307;
      --panel: rgba(18, 7, 10, 0.92);
      --panel2: rgba(8, 3, 6, 0.96);
      --border: rgba(255, 61, 36, 0.48);
      --text: #ffe0a3;
      --muted: #c99462;
      --red: #ff2a16;
      --green: #6dffba;
      --cyan: #63d8ff;
      --editor-size: 15px;
    }

    body[data-theme="matrix"] {
      --bg: #020604;
      --panel: rgba(3, 20, 11, 0.94);
      --panel2: rgba(0, 10, 5, 0.98);
      --border: rgba(109, 255, 186, 0.5);
      --text: #d7ffe8;
      --muted: #78c99a;
      --red: #39ff88;
      --green: #39ff88;
      --cyan: #9affcf;
    }

    body[data-theme="cyber"] {
      --bg: #f2ead9;
      --panel: rgba(255, 248, 232, 0.94);
      --panel2: rgba(235, 226, 208, 0.98);
      --border: rgba(173, 29, 41, 0.45);
      --text: #1d2830;
      --muted: #5d6670;
      --red: #b51d2b;
      --green: #005f56;
      --cyan: #004e7c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Courier New", monospace;
    }

    body {
      overflow: hidden;
      cursor: none;
    }

    body.ready {
      overflow-y: auto;
    }

    body.system-cursor {
      cursor: auto;
    }

    body.system-cursor button,
    body.system-cursor input,
    body.system-cursor select,
    body.system-cursor textarea,
    body.system-cursor a {
      cursor: pointer;
    }

    body.system-cursor .custom-cursor {
      display: none;
    }
